# SKETCH — generate a full program from task signatures alone.
#
# Train last. Largest output space, benefits from more data.

base_model: "Qwen/Qwen2.5-3B"
use_4bit: false

data_path: "traces/training_export.jsonl"
data_format: "jsonl"
task_types:
  - "SKETCH"
max_seq_len: 2048
val_split: 0.1

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"

output_dir: "checkpoints/sketch"
epochs: 3
batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1e-4
warmup_ratio: 0.05
weight_decay: 0.01
logging_steps: 10
save_steps: 200
bf16: true
